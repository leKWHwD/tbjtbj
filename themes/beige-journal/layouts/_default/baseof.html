<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <style>
    body { background: #f5ede0; color: #2a2a2a; font-family: 'DM Sans', sans-serif; line-height: 1.6; }
    h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
  </style>

  <meta name="description" content="{{ .Summary | truncate 160 }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ .Summary | truncate 160 }}">
  {{ if .Params.coverImage }}<meta property="og:image" content="{{ .Params.coverImage }}">{{ end }}
  <link rel="canonical" href="{{ .Permalink }}">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/css/style.css" | relURL }}">

  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "/index.xml" | relURL }}">
</head>
<body>
  {{ partial "header.html" . }}

  <div id="bj-content" class="bj-content-area">
    <main id="bj-main" class="bj-main">
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  {{ partial "footer.html" . }}

  <script src="{{ "/js/animations.js" | relURL }}"></script>
  <script src="{{ "/js/navigation.js" | relURL }}"></script>
  <script src="{{ "/js/search-overlay.js" | relURL }}"></script>
</body>
</html>
