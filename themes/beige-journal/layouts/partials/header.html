<nav id="bj-nav" class="bj-nav" aria-label="Main navigation">
  <a href="{{ .Site.BaseURL }}" class="bj-nav__logo" rel="home">
    {{ .Site.Title }}
  </a>
  <button class="bj-menu-toggle" id="bj-menu-toggle"
    aria-controls="bj-primary-menu"
    aria-expanded="false"
    aria-label="Toggle navigation menu">
    <span></span><span></span><span></span>
  </button>
  <ul id="bj-primary-menu" class="bj-nav__links">
    {{ range .Site.Menus.main }}
      <li><a href="{{ .URL }}">{{ .Name }}</a></li>
    {{ end }}
  </ul>
  <button class="bj-nav-search-btn" aria-label="Open search" aria-controls="bj-search-overlay" aria-expanded="false" type="button">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true" focusable="false"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </button>
</nav>

<div class="bj-search-overlay" id="bj-search-overlay" role="dialog" aria-modal="true" aria-label="Search" aria-hidden="true">
  <button class="bj-search-close" id="bj-search-close" aria-label="Close search">
    &#x2715; <span>Close</span>
  </button>
  <form role="search" method="get" action="{{ .Site.BaseURL }}">
    <input type="search" placeholder="Search..." name="s" aria-label="Search">
  </form>
  <p class="bj-search-overlay__hint">Press Enter to search</p>
</div>
